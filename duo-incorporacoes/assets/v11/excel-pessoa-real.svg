<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3470"/>
      <stop offset="100%" stop-color="#2D4F9E"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F4F9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="url(#bg1)"/>
  <!-- Notebook/Excel -->
  <rect x="120" y="60" width="560" height="240" rx="10" fill="url(#paper)" stroke="#E1E5EE" stroke-width="2"/>
  <rect x="120" y="60" width="560" height="36" rx="10" fill="#207245"/>
  <text x="148" y="84" font-family="Inter,Calibri,sans-serif" font-weight="700" font-size="16" fill="#FFFFFF">Excel · planilha-Dois A.xlsx</text>
  <!-- Linhas -->
  <g stroke="#D6DBE5" stroke-width="1">
    <line x1="120" y1="120" x2="680" y2="120"/>
    <line x1="120" y1="148" x2="680" y2="148"/>
    <line x1="120" y1="176" x2="680" y2="176"/>
    <line x1="120" y1="204" x2="680" y2="204"/>
    <line x1="120" y1="232" x2="680" y2="232"/>
    <line x1="120" y1="260" x2="680" y2="260"/>
  </g>
  <g stroke="#D6DBE5" stroke-width="1">
    <line x1="220" y1="96" x2="220" y2="300"/>
    <line x1="380" y1="96" x2="380" y2="300"/>
    <line x1="520" y1="96" x2="520" y2="300"/>
  </g>
  <!-- Texto labels -->
  <text x="138" y="138" font-family="Inter,Calibri,sans-serif" font-size="13" fill="#1A1A1A">Apto 101</text>
  <text x="238" y="138" font-family="Inter,Calibri,sans-serif" font-size="13" fill="#1A1A1A">Sala A</text>
  <text x="398" y="138" font-family="Inter,Calibri,sans-serif" font-size="13" fill="#1A1A1A">R$ 280.000</text>
  <text x="538" y="138" font-family="Inter,Calibri,sans-serif" font-size="13" fill="#1A1A1A">Vendido</text>
  <text x="138" y="166" font-family="Inter,Calibri,sans-serif" font-size="13" fill="#1A1A1A">Apto 102</text>
  <text x="238" y="166" font-family="Inter,Calibri,sans-serif" font-size="13" fill="#1A1A1A">Sala A</text>
  <!-- Cursor digitando -->
  <g transform="translate(545,138)">
    <rect x="0" y="-12" width="2" height="14" fill="#1A1A1A">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Mão / pessoa real -->
  <circle cx="700" cy="320" r="22" fill="#E97132"/>
  <text x="700" y="326" font-family="Inter,Calibri,sans-serif" font-weight="700" font-size="18" fill="#FFFFFF" text-anchor="middle">👤</text>
  <!-- Texto descritivo -->
  <text x="400" y="334" font-family="Inter,Calibri,sans-serif" font-weight="700" font-size="15" fill="#FFFFFF" text-anchor="middle" opacity="0.85">PESSOA REAL · DIGITANDO MANUALMENTE</text>
</svg>
