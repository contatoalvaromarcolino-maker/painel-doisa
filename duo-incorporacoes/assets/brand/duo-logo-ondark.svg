<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <defs>
    <!-- Sobre fundo escuro: anel esquerdo vira branco (o azul-marinho original sumiria no navy) -->
    <linearGradient id="duo-ring-blend-ondark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E97132"/>
    </linearGradient>
    <clipPath id="duo-overlap-clip-ondark">
      <rect x="336" y="20" width="48" height="140"/>
    </clipPath>
  </defs>

  <!-- Wordmark "DUO" em stroke branco (mesma geometria da versão colorida) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 20 20 L 20 160 L 70 160 C 108 160 132 132 132 90 C 132 48 108 20 70 20 Z"/>
    <path d="M 170 20 L 170 108 C 170 140 194 164 228 164 C 262 164 286 140 286 108 L 286 20"/>
  </g>

  <!-- Aneis: esquerdo branco (era azul-marinho), direito laranja (mantido) -->
  <circle cx="360" cy="90" r="70" fill="none" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="432" cy="90" r="70" fill="none" stroke="#E97132" stroke-width="10"/>
  <g clip-path="url(#duo-overlap-clip-ondark)">
    <circle cx="360" cy="90" r="70" fill="none" stroke="url(#duo-ring-blend-ondark)" stroke-width="10"/>
    <circle cx="432" cy="90" r="70" fill="none" stroke="url(#duo-ring-blend-ondark)" stroke-width="10"/>
  </g>

  <!-- Subtitulo mantido no mesmo cinza (ja legivel sobre navy, confirmado visualmente) -->
  <text x="20" y="205" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" letter-spacing="10" fill="#7a8299">INCORPORAÇÕES</text>
</svg>
