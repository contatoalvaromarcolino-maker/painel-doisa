<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
<meta name="robots" content="noindex,nofollow">
        <meta charset="utf-8" />
        <title>Indicadores — Conceitos e Margens — DOIS A</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            .staticrypt-html { height: 100%; }
            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: 'Inter', Arial, sans-serif;
                background: #080B12;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            .staticrypt-content {
                height: 100%;
                min-height: 100vh;
                background:
                    radial-gradient(ellipse at 20% 60%, rgba(232, 123, 30, 0.07) 0%, transparent 55%),
                    radial-gradient(ellipse at 75% 20%, rgba(22, 40, 71, 0.5) 0%, transparent 50%),
                    #080B12;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }
            .staticrypt-page {
                width: 100%;
                max-width: 480px;
            }
            .staticrypt-form {
                background: rgba(255, 255, 255, 0.04);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 16px;
                padding: 40px 36px 36px;
                box-shadow:
                    0 32px 64px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(232, 123, 30, 0.06) inset;
                text-align: center;
            }
            .doisa-logo {
                display: block;
                margin: 0 auto 28px;
                height: 110px;
                width: auto;
                opacity: 0.95;
            }
            .staticrypt-hr {
                border: none;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                margin: 20px 0 24px;
            }
            .staticrypt-instructions { margin-bottom: 0; }
            .staticrypt-title {
                font-size: 15px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.9);
                letter-spacing: 0.02em;
                margin-bottom: 6px;
            }
            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.4);
                line-height: 1.5;
            }
            .staticrypt-password-container {
                position: relative;
                background: rgba(14, 27, 51, 0.8);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                margin: 0 0 12px;
                transition: border-color 0.2s;
            }
            .staticrypt-password-container:focus-within {
                border-color: rgba(232, 123, 30, 0.6);
                box-shadow: 0 0 0 3px rgba(232, 123, 30, 0.08);
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                width: 100%;
                padding: 14px 44px 14px 16px;
                font-size: 14px;
                font-family: 'Inter', Arial, sans-serif;
                color: rgba(255, 255, 255, 0.9);
                letter-spacing: 0.01em;
            }
            .staticrypt-form input::placeholder {
                color: rgba(255, 255, 255, 0.28);
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.35;
                padding: 0;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.2s;
                filter: invert(1);
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.65; }
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 0 0 14px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                text-align: left;
            }
            .staticrypt-remember input[type="checkbox"] {
                accent-color: #E87B1E;
                width: 15px;
                height: 15px;
                flex-shrink: 0;
            }
            .staticrypt-form .staticrypt-decrypt-button {
                display: block;
                width: 100%;
                padding: 14px 20px;
                background: #E87B1E;
                border: none;
                border-radius: 8px;
                color: #ffffff;
                font-family: 'Inter', Arial, sans-serif;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                cursor: pointer;
                transition: filter 0.2s, transform 0.1s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(1.1); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: scale(0.985); filter: brightness(0.95); }
            .doisa-footer {
                margin-top: 20px;
                font-size: 11px;
                color: rgba(255, 255, 255, 0.18);
                letter-spacing: 0.03em;
            }
            .hidden { display: none !important; }
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #080B12;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 3px solid rgba(232, 123, 30, 0.25);
                border-top-color: #E87B1E;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
            @media (max-width: 480px) {
                .staticrypt-form { padding: 32px 24px 28px; border-radius: 12px; }
            }
        </style>
    </head>
