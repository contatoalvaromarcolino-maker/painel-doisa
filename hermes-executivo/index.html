<title>DOIS A - Abrindo painel</title>
<style>
 html,body{margin:0;height:100%}
 body{display:flex;align-items:center;justify-content:center;
      background:#0E1B33;color:#fff;font-family:Inter,Arial,Helvetica,sans-serif}
 .b{text-align:center;max-width:520px;padding:24px}
 .b h1{font-size:18px;font-weight:600;letter-spacing:.5px;margin:0 0 6px}
 .b p{font-size:14px;color:#c7d0e0;margin:6px 0}
 .b a{color:#E87B1E;text-decoration:none;font-weight:600}
 .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#E87B1E;
      margin:0 3px;animation:p 1s infinite alternate}
 .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
 @keyframes p{from{opacity:.3}to{opacity:1}}
</style>
</head><body><div class="b">
 <h1>DOIS A</h1>
 <p>Abrindo o painel<span class="dot"></span><span class="dot"></span><span class="dot"></span></p>

</div>
